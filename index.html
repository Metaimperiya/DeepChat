<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>💬 DeepChat</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body {
            background: #0a0a0a;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100%;
            overflow: hidden;
            font-size: 18px;
        }
        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 500px;
            margin: 0 auto;
            background: #0f0f0f;
            position: relative;
        }

        /* ====== ШАПКА ====== */
        .header {
            background: linear-gradient(145deg, #1a1a2e, #0a0a0a);
            padding: 14px 18px;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            flex-wrap: wrap;
            gap: 6px;
        }
        .header .title { font-size: 1.3rem; font-weight: 800; }
        .header .title span { color: #1877f2; }
        .header .actions { display: flex; gap: 8px; align-items: center; }
        .header .actions .admin-btn {
            background: none; border: none; color: #444; font-size: 1.1rem;
            cursor: pointer; opacity: 0.15; padding: 0 4px;
        }
        .header .actions .admin-btn:hover { opacity: 0.5; }
        .header .actions .new-room {
            background: #1877f2; border: none; color: #fff;
            padding: 8px 18px; border-radius: 40px; font-size: 0.85rem;
            font-weight: 700; cursor: pointer;
        }
        .header .actions .new-room:hover { background: #4a9eff; }

        /* ====== КОМНАТЫ ====== */
        .rooms-bar {
            padding: 10px 14px;
            background: #0a0a0a;
            border-bottom: 1px solid #1a1a1a;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            flex-shrink: 0;
            max-height: 100px;
            overflow-y: auto;
        }
        .rooms-bar .room-btn {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            color: #aaa;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
        }
        .rooms-bar .room-btn:hover { border-color: #1877f2; color: #fff; }
        .rooms-bar .room-btn.active {
            background: rgba(24,119,242,0.15);
            border-color: #1877f2;
            color: #1877f2;
        }
        .rooms-bar .room-btn .del {
            margin-left: 6px; color: #ff4444; font-size: 0.7rem; opacity: 0.4;
        }
        .rooms-bar .room-btn .del:hover { opacity: 1; }
        .rooms-bar .empty-rooms {
            color: #444; font-size: 0.8rem; padding: 4px 0;
        }

        /* ====== СООБЩЕНИЯ ====== */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 14px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #0a0a0a;
        }
        .messages .empty {
            text-align: center; color: #444; font-size: 1rem; margin-top: 60px;
        }

        .msg {
            max-width: 90%;
            padding: 10px 16px;
            border-radius: 18px;
            font-size: 1.05rem;
            line-height: 1.5;
            background: #1a1a1a;
            color: #ddd;
            align-self: flex-start;
            position: relative;
            word-wrap: break-word;
        }
        .msg.own {
            background: #1877f2;
            color: #fff;
            align-self: flex-end;
        }
        .msg .name {
            font-size: 0.75rem;
            color: #888;
            font-weight: 600;
            margin-bottom: 3px;
        }
        .msg.own .name { color: rgba(255,255,255,0.6); }
        .msg .time {
            font-size: 0.55rem;
            color: #666;
            text-align: right;
            margin-top: 4px;
        }
        .msg.own .time { color: rgba(255,255,255,0.4); }
        .msg .img {
            max-width: 100%; max-height: 200px; border-radius: 10px;
            margin: 6px 0; cursor: pointer;
        }
        .msg .reply-to {
            font-size: 0.75rem; color: #888;
            background: rgba(255,255,255,0.05);
            padding: 4px 10px; border-radius: 8px; margin-bottom: 4px;
            border-left: 3px solid #1877f2;
        }
        .msg.own .reply-to {
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.6);
        }
        .msg .reply-btn {
            background: none; border: none; color: #555;
            font-size: 0.8rem; cursor: pointer; padding: 2px 6px;
            opacity: 0; transition: opacity 0.2s;
            position: absolute; right: 6px; bottom: 6px;
        }
        .msg:hover .reply-btn { opacity: 1; }
        .msg .reply-btn:hover { color: #1877f2; }
        .msg .likes-btn {
            background: none; border: none; color: #ff6b6b;
            font-size: 0.8rem; cursor: pointer; padding: 2px 6px;
        }
        .msg .likes-btn:hover { color: #ff4444; }
        .msg .admin-del {
            background: none; border: none; color: #ff4444;
            font-size: 0.7rem; cursor: pointer; padding: 2px 6px;
            opacity: 0.4;
        }
        .msg .admin-del:hover { opacity: 1; }

        /* ====== ВВОД ====== */
        .input-area {
            padding: 10px 14px;
            border-top: 1px solid #2a2a2a;
            background: #0a0a0a;
            flex-shrink: 0;
        }
        .input-area .reply-indicator {
            font-size: 0.8rem; color: #1877f2;
            padding: 4px 10px; background: rgba(24,119,242,0.08);
            border-radius: 10px; margin-bottom: 6px;
            display: none; justify-content: space-between; align-items: center;
        }
        .input-area .reply-indicator.show { display: flex; }
        .input-area .reply-indicator button {
            background: none; border: none; color: #ff4444;
            cursor: pointer; font-size: 1rem;
        }
        .input-area .row {
            display: flex; gap: 10px;
        }
        .input-area .row input {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 40px;
            padding: 12px 18px;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }
        .input-area .row input:focus { border-color: #1877f2; }
        .input-area .row input:disabled { opacity: 0.3; }
        .input-area .row button {
            background: #1877f2;
            border: none; color: #fff;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
        }
        .input-area .row button:hover { background: #4a9eff; }
        .input-area .row button:disabled { opacity: 0.3; cursor: not-allowed; }
        .input-area .tools {
            display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap;
        }
        .input-area .tools button {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            color: #888;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .input-area .tools button:hover { border-color: #1877f2; color: #fff; }
        .input-area .preview {
            display: none;
            padding: 6px 10px;
            background: #1a1a1a;
            border-radius: 10px;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }
        .input-area .preview.show { display: flex; }
        .input-area .preview img {
            width: 44px; height: 44px; border-radius: 8px; object-fit: cover;
        }
        .input-area .preview button {
            background: #800; color: #fff; border: none;
            padding: 4px 12px; border-radius: 40px; font-size: 0.7rem;
            cursor: pointer;
        }
        .input-area .file-input { display: none; }

        /* ====== МОДАЛКИ ====== */
        .modal-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 20;
            border-radius: 0;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: #1a1a1a;
            padding: 28px;
            border-radius: 24px;
            width: 92%;
            max-width: 380px;
            border: 1px solid #2a2a2a;
        }
        .modal h3 { font-size: 1.2rem; margin-bottom: 8px; color: #fff; }
        .modal .sub { font-size: 0.85rem; color: #666; margin-bottom: 14px; }
        .modal input {
            width: 100%;
            background: #0f0f0f;
            border: 1px solid #2a2a2a;
            border-radius: 40px;
            padding: 12px 18px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            margin-bottom: 14px;
        }
        .modal input:focus { border-color: #1877f2; }
        .modal .btns {
            display: flex; gap: 10px; justify-content: flex-end;
        }
        .modal .btns button {
            padding: 10px 24px; border-radius: 40px; border: none;
            font-weight: 700; font-size: 0.9rem; cursor: pointer;
        }
        .modal .btns .cancel { background: #2a2a2a; color: #aaa; }
        .modal .btns .cancel:hover { background: #3a3a3a; }
        .modal .btns .create { background: #1877f2; color: #fff; }
        .modal .btns .create:hover { background: #4a9eff; }

        /* ====== АДМИН-ПАНЕЛЬ ====== */
        .admin-panel .admin-actions {
            display: flex; flex-direction: column; gap: 8px; margin-top: 12px;
        }
        .admin-panel .admin-actions button {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            color: #fff;
            padding: 12px 16px;
            border-radius: 40px;
            font-size: 0.95rem;
            cursor: pointer;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .admin-panel .admin-actions button:hover {
            border-color: #1877f2;
            background: rgba(24,119,242,0.05);
        }
        .admin-panel .admin-actions button .key {
            color: #888; font-size: 0.7rem;
            background: #111; padding: 2px 12px; border-radius: 40px;
        }
        .admin-panel .admin-actions button.danger { border-color: #ff4444; }
        .admin-panel .admin-actions button.danger:hover { background: rgba(255,68,68,0.1); }

        /* ====== ТОСТ ====== */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 0.9rem;
            color: #aaa;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 30;
            max-width: 90%;
            text-align: center;
        }
        .toast.show { opacity: 1; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }

        @media (max-width: 400px) {
            body { font-size: 16px; }
            .header .title { font-size: 1.1rem; }
            .msg { font-size: 0.95rem; }
            .input-area .row input { font-size: 0.9rem; padding: 10px 14px; }
            .input-area .row button { font-size: 0.9rem; padding: 10px 18px; }
        }
    </style>
</head>
<body>

<div id="app">
    <!-- ====== ШАПКА ====== -->
    <div class="header">
        <div class="title">💬 Deep<span>Chat</span></div>
        <div class="actions">
            <button class="admin-btn" onclick="openAdminLogin()">⚙️</button>
            <button class="new-room" onclick="openModal()">➕ Комната</button>
        </div>
    </div>

    <!-- ====== КОМНАТЫ ====== -->
    <div class="rooms-bar" id="roomsBar">
        <span class="empty-rooms">📁 Нет комнат. Создайте первую!</span>
    </div>

    <!-- ====== СООБЩЕНИЯ ====== -->
    <div class="messages" id="messages">
        <div class="empty">💬 Выберите комнату или создайте новую</div>
    </div>

    <!-- ====== ВВОД ====== -->
    <div class="input-area">
        <div class="reply-indicator" id="replyIndicator">
            <span>📎 Ответ <strong id="replyName"></strong>: <span id="replyText"></span></span>
            <button onclick="cancelReply()">✕</button>
        </div>
        <div class="preview" id="preview">
            <img id="previewImg">
            <span id="previewName" style="flex:1;font-size:0.8rem;color:#888;"></span>
            <button onclick="removeImage()">✕</button>
        </div>
        <div class="row">
            <input type="text" id="input" placeholder="Напишите сообщение..." disabled>
            <button id="sendBtn" onclick="sendMessage()" disabled>➤</button>
        </div>
        <div class="tools">
            <button onclick="document.getElementById('fileInput').click()">🖼️ Фото</button>
            <input type="file" id="fileInput" class="file-input" accept="image/*">
        </div>
    </div>

    <!-- ====== МОДАЛКА НОВОЙ КОМНАТЫ ====== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h3>📝 Новая комната</h3>
            <div class="sub">Название для чата (например: «Работа Киев»)</div>
            <input type="text" id="roomNameInput" placeholder="Название комнаты..." maxlength="30">
            <div class="btns">
                <button class="cancel" onclick="closeModal()">Отмена</button>
                <button class="create" onclick="createRoom()">Создать</button>
            </div>
        </div>
    </div>

    <!-- ====== МОДАЛКА АДМИН-ВХОД ====== -->
    <div class="modal-overlay" id="adminLoginOverlay">
        <div class="modal">
            <h3>🏴‍☠️ Админ-вход</h3>
            <div class="sub">Пароль: <strong style="color:#1877f2;">12345</strong></div>
            <input type="password" id="adminPassword" placeholder="Введите пароль...">
            <div class="btns">
                <button class="cancel" onclick="closeAdminLogin()">Отмена</button>
                <button class="create" onclick="checkAdminPassword()">Войти</button>
            </div>
        </div>
    </div>

    <!-- ====== МОДАЛКА АДМИН-ПАНЕЛИ ====== -->
    <div class="modal-overlay" id="adminPanelOverlay">
        <div class="modal admin-panel">
            <h3>⚙️ Панель управления</h3>
            <div class="sub" id="adminInfo">Админ-режим активен</div>
            <div class="admin-actions">
                <button onclick="adminLike(1)">❤️ Поставить 1 лайк всем комнатам <span class="key">всем</span></button>
                <button onclick="adminLike(10)">❤️❤️ Поставить 10 лайков всем комнатам <span class="key">всем</span></button>
                <button onclick="adminLike(100)">❤️❤️❤️ Поставить 100 лайков всем комнатам <span class="key">всем</span></button>
                <button onclick="adminResetLikes()">🔄 Сбросить все лайки <span class="key">всем</span></button>
                <button onclick="adminDeleteAllRooms()" class="danger">🗑️ Удалить ВСЕ комнаты <span class="key">безвозвратно</span></button>
                <button onclick="closeAdminPanel()">🔒 Выйти из админки <span class="key">безопасно</span></button>
            </div>
        </div>
    </div>
</div>

<!-- ====== ТОСТ ====== -->
<div class="toast" id="toast"></div>

<script>
// ================================================================
// ======  FIREBASE  ======
// ================================================================
const CONFIG = {
    apiKey: "AIzaSyC81Ow4VPAUcaQGAuJjhtA-OaR8hyqxCtI",
    authDomain: "mychatapp-2c141.firebaseapp.com",
    databaseURL: "https://mychatapp-2c141-default-rtdb.firebaseio.com",
    projectId: "mychatapp-2c141",
    storageBucket: "mychatapp-2c141.firebasestorage.app",
    messagingSenderId: "857322151793",
    appId: "1:857322151793:web:387599e9e6f9cf1454a0d0"
};

firebase.initializeApp(CONFIG);
const DB = firebase.database();

// ================================================================
// ======  ID САЙТА (УНИКАЛЬНЫЙ ДЛЯ КАЖДОГО САЙТА)  ======
// ================================================================
const SITE_ID = window.location.hostname.replace(/\./g, '_') || 'default_site';
const PATH = 'sites/' + SITE_ID + '/deepchat';

// ================================================================
// ======  СОСТОЯНИЕ  ======
// ================================================================
let USER = '';
let IS_ADMIN = false;
let CURRENT_ROOM = null;
let REPLY_TO = null;
let IMAGE = null;
let MSG_REF = null;

// ================================================================
// ======  DOM  ======
// ================================================================
const roomsBar = document.getElementById('roomsBar');
const messages = document.getElementById('messages');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const modalOverlay = document.getElementById('modalOverlay');
const roomNameInput = document.getElementById('roomNameInput');
const toastEl = document.getElementById('toast');
const replyIndicator = document.getElementById('replyIndicator');
const replyName = document.getElementById('replyName');
const replyText = document.getElementById('replyText');
const preview = document.getElementById('preview');
const previewImg = document.getElementById('previewImg');
const previewName = document.getElementById('previewName');
const fileInput = document.getElementById('fileInput');

const adminLoginOverlay = document.getElementById('adminLoginOverlay');
const adminPanelOverlay = document.getElementById('adminPanelOverlay');
const adminPassword = document.getElementById('adminPassword');
const adminInfo = document.getElementById('adminInfo');

const ADMIN_PASSWORD = '12345';

// ================================================================
// ======  TOAST  ======
// ================================================================
function showToast(text) {
    toastEl.textContent = text;
    toastEl.classList.add('show');
    clearTimeout(toastEl._timer);
    toastEl._timer = setTimeout(() => toastEl.classList.remove('show'), 2000);
}

// ================================================================
// ======  ВХОД ПОЛЬЗОВАТЕЛЯ  ======
// ================================================================
function loginUser() {
    const saved = localStorage.getItem('dc_user_' + SITE_ID);
    if (saved) {
        USER = saved;
        input.disabled = false;
        sendBtn.disabled = false;
        input.focus();
        return true;
    }
    const nick = prompt('Введите ваше имя (для этого сайта):');
    if (nick && nick.trim()) {
        USER = nick.trim();
        if (USER.length > 24) { alert('Слишком длинное имя'); return loginUser(); }
        localStorage.setItem('dc_user_' + SITE_ID, USER);
        input.disabled = false;
        sendBtn.disabled = false;
        input.focus();
        return true;
    }
    return false;
}

// ================================================================
// ======  ЗАГРУЗКА КОМНАТ  ======
// ================================================================
function loadRooms() {
    DB.ref(PATH + '/rooms').on('value', (snap) => {
        const rooms = snap.val() || {};
        const keys = Object.keys(rooms);

        if (keys.length === 0) {
            roomsBar.innerHTML = '<span class="empty-rooms">📁 Нет комнат. Создайте первую!</span>';
            if (!CURRENT_ROOM) {
                messages.innerHTML = '<div class="empty">💬 Выберите комнату или создайте новую</div>';
                input.disabled = true;
                sendBtn.disabled = true;
            }
            return;
        }

        let html = '';
        keys.forEach(key => {
            const room = rooms[key];
            const isActive = (CURRENT_ROOM === key);
            html += `
                <button class="room-btn ${isActive ? 'active' : ''}" onclick="joinRoom('${key}')">
                    ${room.name || 'Без названия'}
                    ${room.likes ? '❤️ ' + room.likes : ''}
                    ${IS_ADMIN ? `<span class="del" onclick="event.stopPropagation(); deleteRoom('${key}')">✕</span>` : ''}
                </button>
            `;
        });
        roomsBar.innerHTML = html;

        if (CURRENT_ROOM && !keys.includes(CURRENT_ROOM)) {
            CURRENT_ROOM = null;
            messages.innerHTML = '<div class="empty">💬 Комната удалена. Выберите другую</div>';
            input.disabled = true;
            sendBtn.disabled = true;
            if (MSG_REF) { MSG_REF.off(); MSG_REF = null; }
        }
    });
}

// ================================================================
// ======  КОМНАТЫ  ======
// ================================================================
function createRoom() {
    const name = roomNameInput.value.trim();
    if (!name) { showToast('⚠️ Введите название'); return; }
    if (name.length < 2) { showToast('⚠️ Минимум 2 символа'); return; }

    const ref = DB.ref(PATH + '/rooms').push();
    ref.set({
        name: name,
        createdAt: Date.now(),
        likes: 0
    }).then(() => {
        closeModal();
        showToast('✅ Комната "' + name + '" создана!');
        joinRoom(ref.key);
    }).catch(err => showToast('❌ Ошибка: ' + err.message));
}

function deleteRoom(roomId) {
    if (!IS_ADMIN) return;
    if (!confirm('Удалить комнату и все сообщения?')) return;
    DB.ref(PATH + '/rooms/' + roomId).remove()
        .then(() => {
            DB.ref(PATH + '/messages/' + roomId).remove();
            showToast('🗑️ Комната удалена');
        })
        .catch(err => showToast('❌ Ошибка: ' + err.message));
}

function joinRoom(roomId) {
    if (CURRENT_ROOM === roomId) return;
    if (MSG_REF) { MSG_REF.off(); MSG_REF = null; }

    CURRENT_ROOM = roomId;
    input.disabled = false;
    sendBtn.disabled = false;
    input.focus();
    cancelReply();

    messages.innerHTML = '<div style="text-align:center;color:#444;padding:20px;">⏳ Загрузка...</div>';

    MSG_REF = DB.ref(PATH + '/messages/' + roomId);
    MSG_REF.orderByChild('timestamp').limitToLast(150).on('value', (snap) => {
        const data = snap.val() || {};
        const keys = Object.keys(data).sort((a, b) => data[a].timestamp - data[b].timestamp);

        if (keys.length === 0) {
            messages.innerHTML = '<div class="empty">💬 Сообщений пока нет</div>';
            return;
        }

        let html = '';
        keys.forEach(key => {
            const msg = data[key];
            const isOwn = (msg.author === USER);

            let replyHtml = '';
            if (msg.replyTo) {
                replyHtml = `
                    <div class="reply-to">
                        ↳ <strong>${msg.replyToAuthor || 'Кто-то'}</strong>:
                        ${(msg.replyToText || '').substring(0, 50)}${(msg.replyToText || '').length > 50 ? '...' : ''}
                    </div>
                `;
            }

            let imgHtml = '';
            if (msg.img) {
                imgHtml = `<img class="img" src="${msg.img}" onclick="window.open(this.src)">`;
            }

            let content = msg.text || '';
            if (content.includes('[html]')) {
                const parts = content.split(/\[html\]|\[\/html\]/);
                let finalHtml = '';
                for (let i = 0; i < parts.length; i++) {
                    if (i % 2 === 0) finalHtml += parts[i];
                    else finalHtml += `<div style="background:#111;padding:6px 10px;border-radius:8px;margin:4px 0;overflow-x:auto;">${parts[i]}</div>`;
                }
                content = finalHtml;
            }

            const likes = msg.likes || 0;
            const likesStr = likes > 0 ? '❤️ ' + likes : '❤️ 0';

            html += `
                <div class="msg ${isOwn ? 'own' : ''}" id="msg-${key}">
                    <div class="name">${msg.author}</div>
                    ${replyHtml}
                    <div>${content}</div>
                    ${imgHtml}
                    <div class="time">${new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                    <div style="display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;align-items:center;">
                        <button class="reply-btn" onclick="setReply('${key}', '${msg.author}', '${(msg.text || '').replace(/'/g, "\\'").substring(0, 50)}')">↩️</button>
                        <button class="likes-btn" onclick="likeMessage('${key}')">${likesStr}</button>
                        ${IS_ADMIN ? `<button class="admin-del" onclick="deleteMessage('${key}')">🗑</button>` : ''}
                    </div>
                </div>
            `;
        });
        messages.innerHTML = html;
        messages.scrollTop = messages.scrollHeight;
    });

    loadRooms();
}

// ================================================================
// ======  СООБЩЕНИЯ  ======
// ================================================================
function sendMessage() {
    if (!CURRENT_ROOM) { showToast('⚠️ Выберите комнату'); return; }
    const text = input.value.trim();
    if (!text && !IMAGE) return;

    const data = {
        author: USER,
        text: text || '📸 Фото',
        timestamp: Date.now(),
        likes: 0
    };
    if (IMAGE) data.img = IMAGE;
    if (REPLY_TO) {
        data.replyTo = REPLY_TO.id;
        data.replyToAuthor = REPLY_TO.author;
        data.replyToText = REPLY_TO.text;
    }

    DB.ref(PATH + '/messages/' + CURRENT_ROOM).push(data);
    input.value = '';
    removeImage();
    cancelReply();
}

function deleteMessage(msgId) {
    if (!IS_ADMIN) return;
    if (!confirm('Удалить сообщение?')) return;
    DB.ref(PATH + '/messages/' + CURRENT_ROOM + '/' + msgId).remove()
        .then(() => showToast('🗑️ Сообщение удалено'))
        .catch(err => showToast('❌ Ошибка: ' + err.message));
}

function likeMessage(msgId) {
    const ref = DB.ref(PATH + '/messages/' + CURRENT_ROOM + '/' + msgId);
    ref.transaction((current) => {
        if (current) {
            current.likes = (current.likes || 0) + 1;
        }
        return current;
    });
}

// ================================================================
// ======  АДМИН-ЛАЙКИ (ВСЕМ КОМНАТАМ)  ======
// ================================================================
function adminLike(count) {
    if (!IS_ADMIN) { showToast('⛔ Только для админа'); return; }
    DB.ref(PATH + '/rooms').once('value', (snap) => {
        const rooms = snap.val() || {};
        Object.keys(rooms).forEach(key => {
            const current = rooms[key].likes || 0;
            DB.ref(PATH + '/rooms/' + key).update({ likes: current + count });
        });
        showToast('✅ +' + count + ' лайков всем комнатам!');
    });
}

function adminResetLikes() {
    if (!IS_ADMIN) { showToast('⛔ Только для админа'); return; }
    if (!confirm('Сбросить все лайки у всех комнат?')) return;
    DB.ref(PATH + '/rooms').once('value', (snap) => {
        const rooms = snap.val() || {};
        Object.keys(rooms).forEach(key => {
            DB.ref(PATH + '/rooms/' + key).update({ likes: 0 });
        });
        showToast('🔄 Все лайки сброшены!');
    });
}

function adminDeleteAllRooms() {
    if (!IS_ADMIN) { showToast('⛔ Только для админа'); return; }
    if (!confirm('🗑️ УДАЛИТЬ ВСЕ КОМНАТЫ И СООБЩЕНИЯ? Это безвозвратно!')) return;
    if (!confirm('Точно уверен? ВСЁ УДАЛИТСЯ!')) return;
    DB.ref(PATH + '/rooms').remove()
        .then(() => {
            DB.ref(PATH + '/messages').remove();
            showToast('🗑️ Все комнаты удалены!');
            CURRENT_ROOM = null;
            messages.innerHTML = '<div class="empty">💬 Все комнаты удалены. Создайте новую!</div>';
        })
        .catch(err => showToast('❌ Ошибка: ' + err.message));
}

// ================================================================
// ======  ОТВЕТЫ  ======
// ================================================================
function setReply(id, author, text) {
    REPLY_TO = { id, author, text };
    replyName.textContent = author;
    replyText.textContent = text.length > 50 ? text.substring(0, 50) + '...' : text;
    replyIndicator.classList.add('show');
    input.focus();
}
function cancelReply() {
    REPLY_TO = null;
    replyIndicator.classList.remove('show');
}

// ================================================================
// ======  ФОТО  ======
// ================================================================
fileInput.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file || !file.type.startsWith('image/')) return;
    if (file.size > 2 * 1024 * 1024) { showToast('⚠️ Максимум 2MB'); return; }
    const reader = new FileReader();
    reader.onload = function(ev) {
        IMAGE = ev.target.result;
        previewImg.src = IMAGE;
        previewName.textContent = file.name.slice(0, 25);
        preview.classList.add('show');
    };
    reader.readAsDataURL(file);
});
function removeImage() {
    IMAGE = null;
    preview.classList.remove('show');
    fileInput.value = '';
}

// ================================================================
// ======  МОДАЛКИ  ======
// ================================================================
function openModal() {
    modalOverlay.classList.add('open');
    roomNameInput.value = '';
    roomNameInput.focus();
}
function closeModal() { modalOverlay.classList.remove('open'); }

function openAdminLogin() {
    adminLoginOverlay.classList.add('open');
    adminPassword.value = '';
    adminPassword.focus();
}
function closeAdminLogin() { adminLoginOverlay.classList.remove('open'); }

function checkAdminPassword() {
    const pass = adminPassword.value.trim();
    if (pass === ADMIN_PASSWORD) {
        IS_ADMIN = true;
        localStorage.setItem('dc_admin_' + SITE_ID, 'true');
        closeAdminLogin();
        adminPanelOverlay.classList.add('open');
        adminInfo.textContent = '🏴‍☠️ Админ-режим | ' + SITE_ID;
        showToast('🏴‍☠️ Добро пожаловать в админку!');
        loadRooms();
    } else {
        showToast('❌ Неверный пароль!');
        adminPassword.value = '';
        adminPassword.focus();
    }
}
function closeAdminPanel() {
    adminPanelOverlay.classList.remove('open');
    IS_ADMIN = false;
    showToast('🔒 Вы вышли из админки');
    loadRooms();
}

// ================================================================
// ======  ЗАПУСК  ======
// ================================================================
document.addEventListener('DOMContentLoaded', function() {
    // Восстанавливаем пользователя
    const savedUser = localStorage.getItem('dc_user_' + SITE_ID);
    if (savedUser) {
        USER = savedUser;
        input.disabled = false;
        sendBtn.disabled = false;
    } else {
        input.disabled = true;
        sendBtn.disabled = true;
        setTimeout(() => {
            if (!loginUser()) {
                // Если пользователь не ввёл имя — пробуем снова
                setTimeout(() => loginUser(), 500);
            }
        }, 300);
    }

    // Восстанавливаем админа
    if (localStorage.getItem('dc_admin_' + SITE_ID) === 'true') {
        IS_ADMIN = true;
    }

    // Отправка по Enter
    input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    // Закрытие модалок по Escape
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            closeModal();
            closeAdminLogin();
        }
    });

    // Клик вне модалок
    modalOverlay.addEventListener('click', (e) => {
        if (e.target === modalOverlay) closeModal();
    });
    adminLoginOverlay.addEventListener('click', (e) => {
        if (e.target === adminLoginOverlay) closeAdminLogin();
    });
    adminPanelOverlay.addEventListener('click', (e) => {
        if (e.target === adminPanelOverlay) closeAdminPanel();
    });

    // Загружаем комнаты
    loadRooms();

    // Если есть комнаты и пользователь есть — подключаемся к первой
    if (USER) {
        setTimeout(() => {
            DB.ref(PATH + '/rooms').once('value', (snap) => {
                const rooms = snap.val() || {};
                const keys = Object.keys(rooms);
                if (keys.length > 0 && !CURRENT_ROOM) {
                    joinRoom(keys[0]);
                }
            });
        }, 600);
    }

    console.log('💬 DeepChat BIG загружен!');
    console.log('🏷️ ID сайта:', SITE_ID);
    console.log('👤 Пользователь:', USER || 'не выбран');
    console.log('🏴‍☠️ Админ-пароль: 12345');
    console.log('📌 Вставляй этот виджет на любой сайт!');
});
</script>
